# ROS 2 parameter file. The "/**" wildcard applies these values to whatever node
# name loads the file. Angles that used the ROS 1 "deg()" rosparam helper are
# pre-converted to radians below.
/**:
  ros__parameters:
    # how often to add keyframes, this can be varied but between 1 and 4 meters is best
    keyframe_duration: 1.0
    keyframe_translation: 3.0
    keyframe_rotation: 0.5235987755982988   # deg(30)

    # is the SLAM back-end enabled (vs. pure dead reckoning); overridden from launch
    enable_slam: true

    # define the noise models
    # x, y, theta in m, m, rad
    prior_sigmas: [0.1, 0.1, 0.01]
    odom_sigmas: [0.2, 0.2, 0.02]
    icp_odom_sigmas: [0.1, 0.1, 0.01]

    # ICP config. Resolved to an absolute path by the launch file; if left empty
    # the node falls back to the installed package share copy of icp.yaml.
    icp_config: ""

    # Downsample points for ICP/publishing
    point_resolution: 0.5

    # Sequential scan matching (SSM)
    ssm:
      enable: true            # is this module enabled?
      min_points: 50          # the min number of points to try SSM
      max_translation: 3.0    # the max translation allowed
      max_rotation: 0.5235987755982988   # deg(30)
      target_frames: 3        # the number of frames we compare the current frame to

    # Non-sequential scan matching
    nssm:
      enable: true            # is this module enabled?
      min_st_sep: 8           # the size of the exclusion zone around the most recent keyframe
      min_points: 50          # min number of points
      max_translation: 10.0   # max translation allowed
      max_rotation: 1.0471975511965976   # deg(60)
      source_frames: 5        # the number of frames to aggregate when trying a loop closure
      cov_samples: 30

    # the PCM params for rejecting outlier loop closures
    pcm_queue_size: 5         # the sliding window size for PCM
    min_pcm: 2                # the min number of pairwise consistent loop closures

    # TODO remove this param
    # Number of samples to compute the probability of
    # successful non-sequential scan matching p(z)
    pz_samples: 0
    # point re-detection rate
    pz_detection_rate: 0.3
