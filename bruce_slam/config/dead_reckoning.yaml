/**:
  ros__parameters:
    # Localization node
    dvl_max_velocity: 0.5

    # [x y z roll pitch yaw]  (roll = deg(-90))
    imu_pose: [0.0, 0.0, 0.0, -1.5707963267948966, 0.0, 0.0]

    # keyframe spacing for the dead reckoning system
    keyframe_duration: 1.0
    keyframe_translation: 4.0
    keyframe_rotation: 0.5235987755982988   # deg(30)

    # should we use the FOG? Do not set to true if there is no FOG sensor.
    use_gyro: false

    # should we use the VN100 IMU? Set false together with use_gyro:false to run a
    # DVL + depth only mode (no orientation sensor, heading held at zero).
    use_imu: true

    # which IMU driver are we using 1 is the heavy and 2 is heavy MKII
    # sample_data file is version 1
    imu_version: 1

    # ------------------------------------------------------------------------
    # Sensor drivers (pluggable adapters, see bruce_slam/sensors.py).
    # 'driver' selects the message type/parser; 'topic' overrides the default.
    # ------------------------------------------------------------------------
    dvl:
      driver: rti_dvl          # rti_dvl | twist_stamped | twist_cov
      topic: /rti/body_velocity/raw
    depth:
      driver: bar30            # bar30 | fluid_pressure
      topic: /bar30/depth/raw
      # for driver: fluid_pressure (sensor_msgs/FluidPressure -> depth):
      # water_density: 1025.0
      # gravity: 9.80665
    imu:
      # standard sensor_msgs/Imu; blank topic falls back to imu_version
      topic: ""
